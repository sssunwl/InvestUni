name: Update Stock Prices

on:
  schedule:
    - cron: '30 1 * * 1-5'  # 09:30 HKT — HK/TW open
    - cron: '0 5 * * 1-5'   # 13:00 HKT — midday
    - cron: '0 9 * * 1-5'   # 17:00 HKT — after HK/TW close
    - cron: '0 14 * * 1-5'  # 22:00 HKT — before US open
  workflow_dispatch:

jobs:
  update-stocks:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz yfinance

      - name: Fetch stock prices
        run: python scripts/fetch_stocks.py

      - name: Commit and push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.email "actions@github.com"
          git config user.name "InvestUni Bot"
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}
          git add data/stocks.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update stock prices [$(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M HKT')]"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
