name: Update Market News

# 每個市場各有兩個時間窗口：盤前（開市前30-45分）+ 盤後（收市後總結）
# 所有時間均以 HKT (+8) 標示，cron 使用 UTC

on:
  schedule:
    # ── 盤前窗口 ──────────────────────────────
    - cron: '30 23 * * 0-4'  # 07:30 HKT — 🇯🇵 日股盤前
    - cron: '30 0 * * 1-5'   # 08:30 HKT — 🇹🇼 台股盤前
    - cron: '0 1 * * 1-5'    # 09:00 HKT — 🇭🇰 港股盤前 + 🇺🇸 美股夜盤後總結

    # ── 盤後窗口 ──────────────────────────────
    - cron: '0 6 * * 1-5'    # 14:00 HKT — 🇹🇼 台股盤後
    - cron: '0 7 * * 1-5'    # 15:00 HKT — 🇯🇵 日股盤後
    - cron: '30 8 * * 1-5'   # 16:30 HKT — 🇭🇰 港股盤後
    - cron: '0 13 * * 1-5'   # 21:00 HKT — 🇺🇸 美股盤前（夏令 EDT）

  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch news (window-based)
        run: python scripts/fetch_news.py

      - name: Commit and push
        run: |
          git config user.email "actions@github.com"
          git config user.name "InvestUni Bot"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: news update [$(TZ=Asia/Hong_Kong date '+%Y-%m-%d %H:%M HKT')]"
          git push
